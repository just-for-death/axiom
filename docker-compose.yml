# AXIOM Log Server — docker-compose
# Quick start:
#   cp .env.example .env
#   docker compose up -d --build
#   open http://localhost:7654
#   docker compose logs -f axiom

services:

  axiom:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axiom
    restart: unless-stopped
    user: root
    pid: host
    privileged: true

    ports:
      - "${AXIOM_PORT:-7654}:8080"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - GOTIFY_HOST=${GOTIFY_HOST:-}
      - GOTIFY_TOKEN=${GOTIFY_TOKEN:-}

    volumes:
      - /var/log:/host/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /dev:/dev:ro
      - axiom-logs:/var/log/axiom

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

    labels:
      - "com.axiom.version=1.0"


  axiom-log:
    image: python:3.12-slim
    container_name: axiom-log
    restart: unless-stopped
    depends_on:
      axiom:
        condition: service_healthy
    command: ["python3", "-u", "/app/log_watcher.py"]
    volumes:
      - ./log_watcher.py:/app/log_watcher.py:ro
      - axiom-logs:/var/log/axiom
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.axiom.role=log-collector"


volumes:
  axiom-logs:
    driver: local
