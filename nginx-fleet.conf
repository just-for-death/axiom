server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve fleet assets from /assets sub-mount
    location /assets/ {
        alias /usr/share/nginx/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Serve all fleet-* and apple-touch-fleet-* files from assets
    location ~* ^/(fleet-|apple-touch-fleet|manifest-fleet|sw-fleet) {
        root /usr/share/nginx/assets;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Main dashboard page
    location / {
        try_files $uri /index.html;
    }
}
