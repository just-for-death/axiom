# ─────────────────────────────────────────────────────────────────────────────
# AXIOM Pi Agent — Portainer Stack
# Image: justxforxdocker/axiom-pi:latest  (multi-arch: linux/arm64, linux/arm/v7)
#
# Deploy in Portainer:
#   Stacks → Add Stack → paste this file
#   Set environment variables below before deploying
#
# Required: set OLLAMA_HOST to your main AXIOM server IP, e.g. http://100.71.46.98:11434
# ─────────────────────────────────────────────────────────────────────────────

services:

  axiom-pi:
    image: justxforxdocker/axiom-pi:latest
    container_name: axiom-agent
    restart: unless-stopped

    # Required for reading host journals, SMART, proc mounts, and real metrics
    pid: host
    privileged: true
    network_mode: host

    environment:
      - NODE_NAME=${NODE_NAME:-raspberry-pi}
      - NODE_ROLE=agent
      - PORT=${AGENT_PORT:-7655}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.100:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}

    volumes:
      # Host journal access (systemd logs)
      - /var/log:/var/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      # Docker socket for container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Device access for S.M.A.R.T
      - /dev:/dev:ro
      - /sys:/sys:ro
      # CasaOS logs (optional — remove if not using CasaOS)
      - /var/log/casaos:/var/log/casaos:ro

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7655/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

    labels:
      - "com.axiom.role=pi-agent"
      - "com.axiom.version=1.1"

# ─────────────────────────────────────────────────────────────────────────────
# Environment variable reference (set in Portainer → Stacks → Env):
#
#   NODE_NAME     Display name shown in fleet dashboard  (default: raspberry-pi)
#   AGENT_PORT    Port to bind on the Pi                 (default: 7655)
#   OLLAMA_HOST   Ollama endpoint on your main server    (required)
#   OLLAMA_MODEL  Model to use for AI analysis           (default: llama3.2:1b)
# ─────────────────────────────────────────────────────────────────────────────
