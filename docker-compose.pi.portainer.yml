# ─────────────────────────────────────────────────────────────────────────────
# AXIOM Pi Agent — Portainer Stack
# Image: ghcr.io/just-for-death/axiom/axiom-pi-agent:latest  (multi-arch: linux/arm64, linux/arm/v7)
#
# Deploy in Portainer:
#   Stacks → Add Stack → paste this file
#   Edit OLLAMA_HOST below to point at your main AXIOM server before deploying
# ─────────────────────────────────────────────────────────────────────────────

services:

  axiom-pi:
    image: ghcr.io/just-for-death/axiom/axiom-pi-agent:latest
    container_name: axiom-agent
    restart: unless-stopped

    pid: host
    privileged: true
    network_mode: host

    environment:
      - NODE_NAME=raspberry-pi
      - NODE_ROLE=agent
      - PORT=7655
      - OLLAMA_HOST=http://192.168.1.100:11434
      - OLLAMA_MODEL=llama3.2:1b

    volumes:
      - /var/log:/var/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /dev:/dev:ro
      - /sys:/sys:ro
      - /var/log/casaos:/var/log/casaos:ro

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7655/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

    labels:
      - "com.axiom.role=pi-agent"
      - "com.axiom.version=1.1"

# ─────────────────────────────────────────────────────────────────────────────
# Edit OLLAMA_HOST above to point at your main server's IP/port.
# All other values are pre-configured with sensible defaults.
# ─────────────────────────────────────────────────────────────────────────────
