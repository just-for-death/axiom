# AXIOM — Prebuilt compose
# Uses prebuilt image from GHCR
#
# Quick start:
#   docker compose -f docker-compose.prebuilt.yml up -d
#   open http://localhost:7654
#   No .env file needed — all defaults are hardcoded below

services:

  axiom:
    image: ghcr.io/just-for-death/axiom/axiom:latest
    container_name: axiom
    restart: unless-stopped
    user: root
    pid: host
    privileged: true

    ports:
      - "7654:8080"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - GOTIFY_HOST=
      - GOTIFY_TOKEN=

    volumes:
      - /var/log:/host/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /dev:/dev:ro
      - axiom-logs:/var/log/axiom

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

    labels:
      - "com.axiom.version=1.0"


  axiom-log:
    image: python:3.12-slim
    container_name: axiom-log
    restart: unless-stopped
    depends_on:
      axiom:
        condition: service_healthy
    command: ["python3", "-u", "/app/log_watcher.py"]
    volumes:
      - ./log_watcher.py:/app/log_watcher.py:ro
      - axiom-logs:/var/log/axiom
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.axiom.role=log-collector"


  axiom-dashboard:
    image: nginx:alpine
    container_name: axiom-dashboard
    restart: unless-stopped
    ports:
      - "7656:80"
    volumes:
      - ./dashboard.html:/usr/share/nginx/html/index.html:ro
      - ./dashboard.html:/usr/share/nginx/html/dashboard.html:ro
      - ./public:/usr/share/nginx/assets:ro
      - ./nginx-fleet.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.axiom.role=dashboard"


volumes:
  axiom-logs:
    driver: local
